<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	
</head>

<body>

	  <form>
    <!-- 1st -->
    <label>
      <input type="radio" name="option" >
      Option 1
    </label>

    <!-- 2nd (disabled + red) -->
    <label class="input-label">
      <input type="radio" name="option" class="input" disabled>
      Option 2
    </label>

    <!-- 3rd (selected by default) -->
    <label>
      <input type="radio" name="option" checked>
      Option 3
    </label>

    <!-- 4th (red) -->
    <label class="input-label">
      <input type="radio" name="option" class="input">
      Option 4
    </label>

    <!-- 5th -->
    <label>
      <input type="radio" name="option">
      Option 5
    </label>

    <!-- 6th (red) -->
    <label class="input-label">
      <input type="radio" name="option" class="input">
      Option 6
    </label>
  </form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
